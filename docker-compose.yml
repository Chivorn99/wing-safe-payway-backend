version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: safepay-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: safepay_db
    ports:
      - "5432:5432"
    volumes:
      - safepay_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: safepay-api
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/safepay_db
      TESSERACT_PATH: /usr/bin/tesseract
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  safepay_data: