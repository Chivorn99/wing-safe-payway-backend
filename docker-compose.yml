version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: safepay-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: safepay_db
    ports:
      - "5432:5432"
    volumes:
      - safepay_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  safepay_data: