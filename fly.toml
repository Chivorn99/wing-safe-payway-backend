app = 'wing-safe-pay'
primary_region = 'sin'

[build]

[env]
  SERVER_PORT = '8080'
  TESSERACT_PATH = '/usr/share/tessdata'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
