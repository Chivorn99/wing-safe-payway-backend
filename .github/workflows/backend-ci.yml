name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: safepay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/safepay_test
          DB_USERNAME: testuser
          DB_PASSWORD: testpass
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          JWT_EXPIRATION: 86400000
          SERVER_PORT: 8081
          TESSERACT_PATH: /usr/bin/tesseract
        run: ./mvnw clean verify --no-transfer-progress
